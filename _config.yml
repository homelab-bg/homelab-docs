title: Modern Homelab Documentation
description: Infrastructure as Code documentation for a modern homelab
baseurl: ""
url: "https://homelab.blue"

# Theme settings
theme: just-the-docs
color_scheme: dark
search_enabled: true
heading_anchors: true

# Enable copy code buttons
enable_copy_code_button: true

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Aux links for the upper right navigation
aux_links:
  "View on GitHub":
    - "//github.com/homelab-bg/homelab-docs"

# Makes Aux links open in a new tab
aux_links_new_tab: true

# Sort order for navigation links
nav_sort: case_sensitive

# Footer content
footer_content: "Copyright &copy; 2024"

# Google Analytics
ga_tracking: UA-XXXXXXXX
ga_tracking_anonymize_ip: true

# Enable compression
compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false

# Collections for documentation structure
collections:
  dns:
    output: true
    permalink: /:collection/:path/
  networking:
    output: true
    permalink: /:collection/:path/
  kubernetes:
    output: true
    permalink: /:collection/:path/